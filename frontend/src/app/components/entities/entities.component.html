<div class="p-6 bg-slate-900 min-h-screen text-slate-200">
  <h2 class="text-3xl font-bold text-blue-500 mb-6">Gestion des entités</h2>

  <div
    *ngIf="loading()"
    class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div
      class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
  </div>

  <div
    class="bg-slate-800 border border-slate-700 rounded-xl p-6 shadow-lg mb-8">
    <h3 class="text-xl font-semibold mb-4 text-slate-100">
      {{ editingId() ? "Edit Entity" : "Ajouter une nouvelle entité" }}
    </h3>

    <form
      [formGroup]="entityForm"
      (ngSubmit)="onSubmit()"
      class="flex flex-col md:flex-row gap-4 items-end">
      <div class="flex-1 w-full flex flex-col">
        <label class="text-sm text-slate-400 mb-1">Nom de l'entité</label>
        <input
          formControlName="name"
          type="text"
          placeholder=" Developpeur, Ingenieur..."
          class="w-full bg-slate-900 border border-slate-700 text-white px-4 py-2 rounded-lg focus:outline-none focus:border-blue-500 transition-colors" />
      </div>

      <div class="flex space-x-3 w-full md:w-auto">
        <button
          *ngIf="editingId()"
          type="button"
          (click)="cancelEdit()"
          class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 rounded-lg transition-colors">
          Annuler
        </button>

        <button
          type="submit"
          [disabled]="entityForm.invalid"
          class="px-6 py-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-lg transition-colors w-full md:w-auto">
          {{ editingId() ? "Mise à jour" : "Créer" }}
        </button>
      </div>
    </form>
  </div>

  <div
    class="bg-slate-800 border border-slate-700 rounded-xl shadow-lg overflow-hidden">
    <table class="w-full text-left text-sm">
      <thead class="bg-slate-900/50 border-b border-slate-700 text-slate-400">
        <tr>
          <th class="p-4 w-24">ID</th>
          <th class="p-4">Name</th>
          <th class="p-4 text-right">Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (entity of entities(); track entity.id) {
        <tr
          class="border-b border-slate-800 hover:bg-slate-700/30 transition-colors">
          <td class="p-4 text-slate-400">#{{ entity.id }}</td>
          <td class="p-4 font-semibold text-slate-200">{{ entity.name }}</td>
          <td class="p-4 text-right space-x-4">
            <button
              (click)="editEntity(entity)"
              class="inline-flex items-center text-amber-400 hover:scale-110 transition">
              <i class="fa-solid fa-pen-to-square text-lg"></i>
              <span class="hidden md:inline ml-2 font-medium">Modifier</span>
            </button>

            <button
              (click)="deleteEntity(entity.id!)"
              class="inline-flex items-center text-red-500 hover:scale-110 transition">
              <i class="fa-solid fa-trash-can text-lg"></i>
              <span class="hidden md:inline ml-2 font-medium">Supprimer</span>
            </button>
          </td>
        </tr>
        } @if (entities().length === 0 && !loading()) {
        <tr>
          <td colspan="3" class="p-10 text-center text-slate-500">
            <i class="fas fa-box-open text-3xl mb-3"></i>
            <p>Aucune entité trouvée.</p>
          </td>
        </tr>
        }
      </tbody>
    </table>
  </div>
</div>
